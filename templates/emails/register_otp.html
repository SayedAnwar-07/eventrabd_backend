<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Dark mode support -->
    <style>
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #121212 !important;
          color: #ffffff !important;
        }
        .container {
          background: #1e1e1e !important;
        }
        .otp-box {
          background: #2c2c2c !important;
          border-color: #444 !important;
          color: #fff !important;
        }
        .button {
          background: #0d6efd !important;
          color: #fff !important;
        }
      }
    </style>
  </head>

  <body
    style="
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    "
  >
    <!-- Main Container -->
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      border="0"
    >
      <tr>
        <td align="center" style="padding: 20px 0">
          <table
            role="presentation"
            width="600"
            class="container"
            style="
              background: #ffffff;
              border-radius: 8px;
              padding: 25px;
              border: 1px solid #e5e5e5;
            "
          >
            <tr>
              <td>
                <h1
                  style="
                    font-size: 24px;
                    margin-bottom: 10px;
                    color: #333;
                  "
                >
                  Registration Successful 🎉
                </h1>

                <p style="font-size: 16px; color: #555">
                  Hi <strong>{{ full_name }}</strong>,
                </p>

                <p style="font-size: 16px; color: #555">
                  Welcome to <span style="color: #99101b">EventraBD</span>! Your
                  OTP to complete your registration is:
                </p>

                <!-- OTP BOX -->
                <div
                  class="otp-box"
                  style="
                    font-size: 30px;
                    font-weight: bold;
                    letter-spacing: 12px;
                    background: #f0f0f0;
                    padding: 15px 20px;
                    border-radius: 8px;
                    border: 1px solid #ddd;
                    display: inline-block;
                    user-select: all;
                    margin-top: 10px;
                  "
                >
                  {{ otp }}
                </div>


                <p style="font-size: 16px; color: #555; margin-top: 25px">
                  ⏳ This OTP is valid for <strong>10 minutes</strong>.
                </p>

                <p style="font-size: 16px; color: #555">
                  If you did not request this, please ignore this email.
                </p>

                <br />

                <p style="font-size: 16px; color: #333">
                  Thanks,<br />
                  <strong
                    >The
                    <span style="color: #99101b">EventraBD</span> Team</strong
                  >
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
